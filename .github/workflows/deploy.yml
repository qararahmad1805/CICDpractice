name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # 1) Backend Tests
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python manage.py test

  # 2) Build + Push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build/push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest

      - name: Build/push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest --build-arg REACT_APP_API_URL=/api ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest

  # 3) Redeploy frontend + backend services on Railway
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      # Use RAILWAY_TOKEN as the standard env var for the CLI
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Redeploy backend service
        run: |
          railway redeploy \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --service ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }} \
            --yes

      - name: Redeploy frontend service
        run: |
          railway redeploy \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --service ${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }} \
            --yes
