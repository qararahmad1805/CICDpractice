server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 1. Point to the base URL only
        proxy_pass https://backend-production-2aa1.up.railway.app;
        
        # 2. Critical: Use the backend's domain for the Host header
        proxy_set_header Host backend-production-2aa1.up.railway.app;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 3. Handle trailing slashes and timeouts
        proxy_redirect off;
    }
}
